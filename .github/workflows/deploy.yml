name: Deploy AI Affiliate Pro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.156.209.250 >> ~/.ssh/known_hosts

      - name: Deploy to Hetzner
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ root@178.156.209.250:/var/www/aiaffiliatepro/

      - name: Restart app
        run: |
          ssh root@178.156.209.250 << 'EOF'
            cd /var/www/aiaffiliatepro
            npm ci
            npm run db:push || true
            pm2 reload ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production
            pm2 save
          EOF
